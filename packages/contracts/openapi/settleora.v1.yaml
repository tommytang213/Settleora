openapi: 3.1.0
info:
  title: Settleora API
  version: 0.1.0
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: >
    OpenAPI contract for Settleora scaffold materialization. Generated mobile
    and web clients will be produced from this file later, and generated output
    must not be manually edited. This contract currently covers scaffold health
    checks, local sign-in, and the minimal current-user auth read boundary; it
    is not the feature contract for registration, sign-out, refresh-token
    rotation, session management, expenses, settlement, sync, OCR upload, users,
    or database behavior.
servers:
  - url: /
paths:
  /health:
    get:
      summary: Health check
      description: Placeholder health endpoint for future API availability checks.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
        "400":
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /health/ready:
    get:
      summary: Readiness check
      description: Checks PostgreSQL, RabbitMQ, and storage connectivity without exposing dependency details.
      operationId: getHealthReady
      security: []
      responses:
        "200":
          description: Service is ready for requests that require PostgreSQL, RabbitMQ, and storage connectivity.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - checks
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                    example: ready
                  service:
                    type: string
                    example: settleora-api
                  checks:
                    type: object
                    required:
                      - postgres
                      - rabbitmq
                      - storage
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                        example: ok
                      rabbitmq:
                        type: string
                        enum:
                          - ok
                        example: ok
                      storage:
                        type: string
                        enum:
                          - ok
                        example: ok
        "400":
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Service is not ready because PostgreSQL, RabbitMQ, or storage connectivity is unavailable.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - checks
                properties:
                  status:
                    type: string
                    enum:
                      - unready
                    example: unready
                  service:
                    type: string
                    example: settleora-api
                  checks:
                    type: object
                    required:
                      - postgres
                      - rabbitmq
                      - storage
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                          - failed
                        example: failed
                      rabbitmq:
                        type: string
                        enum:
                          - ok
                          - failed
                        example: failed
                      storage:
                        type: string
                        enum:
                          - ok
                          - failed
                        example: failed
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/sign-in:
    post:
      summary: Local sign-in
      description: Authenticates a local account with an identifier and password, returning an opaque session token only on success.
      operationId: signInLocal
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocalSignInRequest"
      responses:
        "200":
          description: Local sign-in succeeded and returned a new session token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalSignInResponse"
        "401":
          description: Sign-in failed without revealing account, credential, or policy state.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "429":
          description: Too many sign-in attempts.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/current-user:
    get:
      summary: Current authenticated user
      description: Validates an opaque bearer session token and returns the minimal authenticated actor, profile, session, and system-role summary.
      operationId: getCurrentUser
      security:
        - SessionBearerAuth: []
      responses:
        "200":
          description: Current authenticated user summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  securitySchemes:
    SessionBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
  schemas:
    LocalSignInRequest:
      type: object
      description: Local-account sign-in request. Source, network, and policy bucket details are derived server-side.
      additionalProperties: false
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 320
          description: Submitted local account identifier.
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 4096
          description: Submitted local account password. The API never stores this plaintext value.
        deviceLabel:
          type: string
          maxLength: 120
          description: Optional display label for the newly created session.
        requestedSessionLifetimeMinutes:
          type: integer
          format: int32
          minimum: 1
          maximum: 43200
          description: Optional requested session lifetime, capped by the API.
    LocalSignInResponse:
      type: object
      description: Minimal local sign-in success response. The raw session token is returned only once.
      required:
        - authAccountId
        - userProfileId
        - session
      properties:
        authAccountId:
          type: string
          format: uuid
        userProfileId:
          type: string
          format: uuid
        session:
          $ref: "#/components/schemas/LocalSignInSession"
    LocalSignInSession:
      type: object
      description: Newly created opaque session returned from local sign-in.
      required:
        - id
        - token
        - expiresAtUtc
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          minLength: 1
          description: Opaque raw session token returned once on sign-in success.
        expiresAtUtc:
          type: string
          format: date-time
    CurrentUserResponse:
      type: object
      description: Minimal current authenticated actor, profile, session, and system-role summary.
      required:
        - authAccountId
        - userProfile
        - session
        - roles
      properties:
        authAccountId:
          type: string
          format: uuid
        userProfile:
          $ref: "#/components/schemas/CurrentUserProfile"
        session:
          $ref: "#/components/schemas/CurrentUserSession"
        roles:
          type: array
          items:
            type: string
            enum:
              - owner
              - admin
              - user
          uniqueItems: true
    CurrentUserProfile:
      type: object
      description: Linked active user profile summary for the authenticated account.
      required:
        - id
        - displayName
        - defaultCurrency
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        defaultCurrency:
          oneOf:
            - $ref: "#/components/schemas/CurrencyCode"
            - type: "null"
    CurrentUserSession:
      type: object
      description: Validated current session summary.
      required:
        - id
        - expiresAtUtc
      properties:
        id:
          type: string
          format: uuid
        expiresAtUtc:
          type: string
          format: date-time
    CurrencyCode:
      type: string
      pattern: "^[A-Z]{3}$"
      description: ISO-4217 style currency code.
      examples:
        - USD
    Money:
      type: object
      description: Decimal-safe money value with an attached currency.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          description: Decimal-safe amount represented as a string to avoid floating point loss.
          examples:
            - "12.34"
        currency:
          $ref: "#/components/schemas/CurrencyCode"
    RoundingMode:
      type: string
      description: Placeholder rounding modes for future policy-driven money handling.
      enum:
        - up
        - down
        - nearest
        - bankers
    SyncState:
      type: string
      description: Placeholder sync state values shared by local and server-mode clients.
      enum:
        - queued
        - synced
        - conflict
        - failed
    StorageObjectRef:
      type: object
      description: Stable storage object reference that does not expose physical filesystem paths.
      required:
        - id
      properties:
        id:
          type: string
          description: Opaque storage object identifier.
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
    ProblemDetails:
      type: object
      description: RFC 7807 / RFC 9457 style problem response.
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    OcrJobStatus:
      type: string
      description: Placeholder OCR job status values for future worker contract design.
      enum:
        - queued
        - processing
        - completed
        - failed
