openapi: 3.1.0
info:
  title: Settleora API
  version: 0.1.0
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  description: >
    OpenAPI contract for Settleora scaffold materialization. Generated mobile
    and web clients are produced from this file, and generated output
    must not be manually edited. This contract currently covers scaffold health
    checks, first-owner local bootstrap status/creation for fresh deployments,
    refresh-capable local sign-in, public refresh, current-session sign-out,
    current-account sign-out-all, current-account session list and per-session
    revocation, the minimal current-user auth read boundary, and guarded
    self-profile read/update endpoints plus guarded group create/list/read/update
    and group member-management foundations plus guarded admin local-user
    list/read/create foundations; it is not the feature contract for
    general public registration, invitations, auth middleware, session management beyond
    current-session sign-out, current-account sign-out-all/list/revocation, and
    public refresh, broader user management, role assignment, group invitations,
    guest members, expenses, settlement, sync, OCR upload, UI behavior, or database behavior.
servers:
  - url: /
paths:
  /health:
    get:
      summary: Health check
      description: Placeholder health endpoint for future API availability checks.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service health response.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
        "400":
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /health/ready:
    get:
      summary: Readiness check
      description: Checks PostgreSQL, RabbitMQ, and storage connectivity without exposing dependency details.
      operationId: getHealthReady
      security: []
      responses:
        "200":
          description: Service is ready for requests that require PostgreSQL, RabbitMQ, and storage connectivity.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - checks
                properties:
                  status:
                    type: string
                    enum:
                      - ready
                    example: ready
                  service:
                    type: string
                    example: settleora-api
                  checks:
                    type: object
                    required:
                      - postgres
                      - rabbitmq
                      - storage
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                        example: ok
                      rabbitmq:
                        type: string
                        enum:
                          - ok
                        example: ok
                      storage:
                        type: string
                        enum:
                          - ok
                        example: ok
        "400":
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "503":
          description: Service is not ready because PostgreSQL, RabbitMQ, or storage connectivity is unavailable.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - checks
                properties:
                  status:
                    type: string
                    enum:
                      - unready
                    example: unready
                  service:
                    type: string
                    example: settleora-api
                  checks:
                    type: object
                    required:
                      - postgres
                      - rabbitmq
                      - storage
                    properties:
                      postgres:
                        type: string
                        enum:
                          - ok
                          - failed
                        example: failed
                      rabbitmq:
                        type: string
                        enum:
                          - ok
                          - failed
                        example: failed
                      storage:
                        type: string
                        enum:
                          - ok
                          - failed
                        example: failed
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/bootstrap/status:
    get:
      summary: Bootstrap status
      description: Returns only whether first-owner local bootstrap is required because no auth account exists.
      operationId: getAuthBootstrapStatus
      security: []
      responses:
        "200":
          description: Bounded bootstrap setup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatusResponse"
        "400":
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/bootstrap/local-owner:
    post:
      summary: Bootstrap first local owner
      description: Creates the first local owner account only while no auth account exists. This is not general public registration; clients must sign in normally after bootstrap succeeds.
      operationId: bootstrapLocalOwner
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapLocalOwnerRequest"
      responses:
        "200":
          description: Local owner bootstrap succeeded without returning credential or token material.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapLocalOwnerResponse"
        "400":
          description: The submitted bootstrap request is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Bootstrap is unavailable because an auth account already exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Bootstrap could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/sign-in:
    post:
      summary: Local sign-in
      description: Authenticates a local account with an identifier and password, returning a refresh-capable opaque access session plus initial refresh-like credential only once on success.
      operationId: signInLocal
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocalSignInRequest"
      responses:
        "200":
          description: Local sign-in succeeded and returned new credential material once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalSignInResponse"
        "401":
          description: Sign-in failed without revealing account, credential, or policy state.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "429":
          description: Too many sign-in attempts.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/refresh:
    post:
      summary: Refresh session
      description: Rotates a submitted refresh-like credential and returns a new opaque access-session token plus replacement refresh-like credential only on success.
      operationId: refreshSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshSessionRequest"
      responses:
        "200":
          description: Refresh succeeded and returned replacement credential material once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshSessionResponse"
        "401":
          description: Refresh failed without revealing credential, account, session, or family state.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Refresh could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/sign-out:
    post:
      summary: Current session sign-out
      description: Validates the submitted opaque bearer session token and revokes only that current session.
      operationId: signOutCurrentSession
      security:
        - SessionBearerAuth: []
      responses:
        "204":
          description: Current session was revoked. No response body is returned.
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/sign-out-all:
    post:
      summary: Current account sign-out-all
      description: Validates the submitted opaque bearer session token and revokes all active sessions owned by the authenticated account, including the submitted current session.
      operationId: signOutAllCurrentAccountSessions
      security:
        - SessionBearerAuth: []
      responses:
        "204":
          description: Active sessions for the current account were revoked. No response body is returned.
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Sign-out-all failed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/sessions:
    get:
      summary: Current account sessions
      description: Validates the submitted opaque bearer session token and lists safe metadata for active sessions owned by the authenticated account.
      operationId: listCurrentAccountSessions
      security:
        - SessionBearerAuth: []
      responses:
        "200":
          description: Active sessions owned by the authenticated account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/sessions/{sessionId}:
    delete:
      summary: Revoke current account session
      description: Validates the submitted opaque bearer session token and revokes one session owned by the authenticated account.
      operationId: revokeCurrentAccountSession
      security:
        - SessionBearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Session ID to revoke.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Session was revoked. No response body is returned.
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Requested session is unavailable to revoke.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/auth/current-user:
    get:
      summary: Current authenticated user
      description: Validates an opaque bearer session token and returns the minimal authenticated actor, profile, session, and system-role summary.
      operationId: getCurrentUser
      security:
        - SessionBearerAuth: []
      responses:
        "200":
          description: Current authenticated user summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/admin/users:
    get:
      summary: List admin users
      description: Lists safe user summaries for non-deleted profiles/accounts. Requires an authenticated SettleoraSession with system owner or admin role; ordinary users are forbidden. This is not public registration or invitation management.
      operationId: listAdminUsers
      security:
        - SessionBearerAuth: []
      responses:
        "200":
          description: Safe admin user summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: The authenticated actor is not a system owner or admin.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/admin/users/local:
    post:
      summary: Create admin local user
      description: Creates a normal local-account user through an authenticated owner/admin path. The API derives the actor server-side, assigns only the system user role, and returns no session tokens, password material, credential metadata, provider payloads, audit metadata, storage paths, or invitation state. This is not public self-registration.
      operationId: createAdminLocalUser
      security:
        - SessionBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocalUserRequest"
      responses:
        "201":
          description: Local user was created with the default system user role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummaryResponse"
        "400":
          description: The submitted local-user creation request is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: The authenticated actor is not a system owner or admin.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: A local user cannot be created with the submitted information.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Local user creation could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/admin/users/{userProfileId}:
    get:
      summary: Get admin user
      description: Returns one safe user summary for a non-deleted profile/account. Requires an authenticated SettleoraSession with system owner or admin role; ordinary users are forbidden.
      operationId: getAdminUser
      security:
        - SessionBearerAuth: []
      parameters:
        - name: userProfileId
          in: path
          required: true
          description: User profile ID to read.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Safe admin user summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserSummaryResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: The authenticated actor is not a system owner or admin.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: User profile or auth account is missing, deleted, or unavailable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/groups:
    post:
      summary: Create group
      description: Creates a group for the authenticated actor and creates an active owner membership for that actor. The creator profile is derived server-side; clients cannot submit owner or creator IDs.
      operationId: createGroup
      security:
        - SessionBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created with an active owner membership for the authenticated actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          description: The submitted group creation request is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The current profile is unavailable or not allowed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Group creation could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    get:
      summary: List current user's groups
      description: Lists non-deleted groups where the authenticated actor has active membership. This is a foundation endpoint without pagination; future group list slices are expected to add pagination or filtering when needed.
      operationId: listGroups
      security:
        - SessionBearerAuth: []
      responses:
        "200":
          description: Groups where the authenticated actor has active membership.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupListResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The current profile is unavailable or not allowed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/groups/{groupId}:
    get:
      summary: Get group
      description: Returns one non-deleted group only when the authenticated actor has active membership.
      operationId: getGroup
      security:
        - SessionBearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group ID to read.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group visible to the authenticated actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Group is missing, deleted, unrelated, or unavailable to the authenticated actor.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    patch:
      summary: Update group
      description: Updates the group name only when the authenticated actor is an active owner of the group.
      operationId: updateGroup
      security:
        - SessionBearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group ID to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupRequest"
      responses:
        "200":
          description: Updated group visible to the authenticated actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          description: The submitted group update request is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: The authenticated actor has active group membership but is not allowed to update group settings.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Group is missing, deleted, unrelated, or unavailable to the authenticated actor.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Group update could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/groups/{groupId}/members:
    get:
      summary: List group members
      description: Lists active registered members for a non-deleted group only when the authenticated actor has active group membership. Removed memberships, auth account IDs, identifiers, credentials, sessions, token material, provider payloads, audit metadata, storage paths, and unrelated users are excluded.
      operationId: listGroupMembers
      security:
        - SessionBearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group ID whose active members should be listed.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Active group members visible to the authenticated actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMemberListResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Group is missing, deleted, unrelated, or unavailable to the authenticated actor.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      summary: Add group member
      description: Adds an existing active registered user profile to a group only when the authenticated actor is an active group owner. This foundation does not create invitations, guest placeholders, auth accounts, or billing participation defaults.
      operationId: addGroupMember
      security:
        - SessionBearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group ID whose membership should be changed.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddGroupMemberRequest"
      responses:
        "201":
          description: Existing registered user was added as an active group member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMemberResponse"
        "400":
          description: The submitted group member request is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: The authenticated actor has active group membership but is not allowed to manage group members.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Group or target registered user is missing, deleted, unrelated, or unavailable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Active or removed membership already exists for the target user.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/groups/{groupId}/members/{userProfileId}:
    patch:
      summary: Update group member role
      description: Updates an active group member's group role only when the authenticated actor is an active group owner. The API rejects last-owner demotion with 409 Conflict.
      operationId: updateGroupMember
      security:
        - SessionBearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group ID whose membership should be changed.
          schema:
            type: string
            format: uuid
        - name: userProfileId
          in: path
          required: true
          description: User profile ID for the active group membership to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupMemberRequest"
      responses:
        "200":
          description: Updated active group member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMemberResponse"
        "400":
          description: The submitted group member request is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: The authenticated actor has active group membership but is not allowed to manage group members.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Group or target active membership is missing, deleted, unrelated, or unavailable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: The requested role change would remove the last active owner.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Group member update could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    delete:
      summary: Remove group member
      description: Marks an active group member as removed only when the authenticated actor is an active group owner. Membership rows are not hard-deleted. The API rejects last-owner removal with 409 Conflict.
      operationId: removeGroupMember
      security:
        - SessionBearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          description: Group ID whose membership should be changed.
          schema:
            type: string
            format: uuid
        - name: userProfileId
          in: path
          required: true
          description: User profile ID for the active group membership to remove.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Active group member was marked removed.
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "403":
          description: The authenticated actor has active group membership but is not allowed to manage group members.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Group or target active membership is missing, deleted, unrelated, or unavailable.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: The requested removal would remove the last active owner.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Group member removal could not be completed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/users/me/profile:
    get:
      summary: Self user profile
      description: Returns the authenticated actor's own active profile through the server-side business authorization boundary.
      operationId: getSelfUserProfile
      security:
        - SessionBearerAuth: []
      responses:
        "200":
          description: Authenticated user's profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfUserProfileResponse"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The current profile is unavailable or not allowed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    patch:
      summary: Update self user profile
      description: Updates safe fields on the authenticated actor's own active profile through the server-side business authorization boundary.
      operationId: updateSelfUserProfile
      security:
        - SessionBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSelfUserProfileRequest"
      responses:
        "200":
          description: Updated authenticated user's profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfUserProfileResponse"
        "400":
          description: The submitted profile update is invalid.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Authentication is required to access this resource.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: The current profile is unavailable or not allowed.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        default:
          description: Problem response.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
components:
  securitySchemes:
    SessionBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
  schemas:
    BootstrapStatusResponse:
      type: object
      description: Bounded setup status for first-owner local bootstrap.
      required:
        - bootstrapRequired
      properties:
        bootstrapRequired:
          type: boolean
          description: True only when no auth account exists.
    BootstrapLocalOwnerRequest:
      type: object
      description: First-owner local bootstrap request for a fresh deployment. This is not general public registration.
      additionalProperties: false
      required:
        - identifier
        - password
        - displayName
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 320
          description: Submitted local account identifier, normalized server-side consistently with local sign-in.
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 4096
          description: Submitted local account password. The API never stores this plaintext value.
        displayName:
          type: string
          minLength: 1
          maxLength: 160
          description: Initial user profile display name after server-side trimming.
        defaultCurrency:
          oneOf:
            - $ref: "#/components/schemas/CurrencyCode"
            - type: "null"
          description: Optional initial default currency. Explicit null is accepted.
    BootstrapLocalOwnerResponse:
      type: object
      description: Safe first-owner bootstrap response. It excludes session tokens, password material, credential metadata, provider payloads, audit metadata, storage paths, and unrelated records.
      required:
        - userProfile
        - roles
      properties:
        userProfile:
          $ref: "#/components/schemas/SelfUserProfileResponse"
        roles:
          type: array
          items:
            type: string
            enum:
              - owner
              - admin
              - user
    LocalSignInRequest:
      type: object
      description: Local-account sign-in request. Source, network, and policy bucket details are derived server-side.
      additionalProperties: false
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 320
          description: Submitted local account identifier.
        password:
          type: string
          format: password
          minLength: 1
          maxLength: 4096
          description: Submitted local account password. The API never stores this plaintext value.
        deviceLabel:
          type: string
          maxLength: 120
          description: Optional display label for the newly created session.
    LocalSignInResponse:
      type: object
      description: Minimal refresh-capable local sign-in success response. Raw credential material is returned only once.
      required:
        - session
        - refreshCredential
      properties:
        session:
          $ref: "#/components/schemas/RefreshSessionAccessSession"
        refreshCredential:
          $ref: "#/components/schemas/RefreshSessionCredential"
    RefreshSessionRequest:
      type: object
      description: Public refresh request. Credential lookup, account, session-family, status, expiry, and revocation policy are resolved server-side.
      additionalProperties: false
      required:
        - refreshCredential
      properties:
        refreshCredential:
          type: string
          minLength: 1
          description: Submitted raw refresh-like credential. The API never stores this raw value.
        deviceLabel:
          type: string
          maxLength: 120
          description: Optional display label for the replacement access session.
    RefreshSessionResponse:
      type: object
      description: Minimal refresh success response. Raw credential material is returned only once.
      required:
        - session
        - refreshCredential
      properties:
        session:
          $ref: "#/components/schemas/RefreshSessionAccessSession"
        refreshCredential:
          $ref: "#/components/schemas/RefreshSessionCredential"
    RefreshSessionAccessSession:
      type: object
      description: Replacement opaque access session returned from refresh.
      required:
        - id
        - token
        - expiresAtUtc
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
          minLength: 1
          description: Opaque raw access-session token returned once on refresh success.
        expiresAtUtc:
          type: string
          format: date-time
    RefreshSessionCredential:
      type: object
      description: Replacement refresh-like credential returned from refresh.
      required:
        - token
        - idleExpiresAtUtc
        - absoluteExpiresAtUtc
      properties:
        token:
          type: string
          minLength: 1
          description: Raw refresh-like credential returned once on refresh success.
        idleExpiresAtUtc:
          type: string
          format: date-time
        absoluteExpiresAtUtc:
          type: string
          format: date-time
    CurrentUserResponse:
      type: object
      description: Minimal current authenticated actor, profile, session, and system-role summary.
      required:
        - authAccountId
        - userProfile
        - session
        - roles
      properties:
        authAccountId:
          type: string
          format: uuid
        userProfile:
          $ref: "#/components/schemas/CurrentUserProfile"
        session:
          $ref: "#/components/schemas/CurrentUserSession"
        roles:
          type: array
          items:
            type: string
            enum:
              - owner
              - admin
              - user
          uniqueItems: true
    CurrentUserProfile:
      type: object
      description: Linked active user profile summary for the authenticated account.
      required:
        - id
        - displayName
        - defaultCurrency
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        defaultCurrency:
          oneOf:
            - $ref: "#/components/schemas/CurrencyCode"
            - type: "null"
    CurrentUserSession:
      type: object
      description: Validated current session summary.
      required:
        - id
        - expiresAtUtc
      properties:
        id:
          type: string
          format: uuid
        expiresAtUtc:
          type: string
          format: date-time
    CreateLocalUserRequest:
      type: object
      description: Authenticated owner/admin local-user creation request. The server derives the actor and assigns only the default system user role.
      additionalProperties: false
      required:
        - identifier
        - password
        - displayName
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 320
          description: Submitted local account identifier, normalized server-side consistently with local sign-in and first-owner bootstrap.
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 4096
          description: Submitted local account password. The API never stores this plaintext value.
        displayName:
          type: string
          minLength: 1
          maxLength: 160
          description: Initial user profile display name after server-side trimming.
        defaultCurrency:
          oneOf:
            - $ref: "#/components/schemas/CurrencyCode"
            - type: "null"
          description: Optional initial default currency. Explicit null is accepted.
    AdminUserListResponse:
      type: object
      description: Safe admin user list response for owner/admin user-management foundations.
      required:
        - users
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserSummaryResponse"
    AdminUserSummaryResponse:
      type: object
      description: Safe admin user summary. It excludes identifiers, password material, credential metadata, session/token material, refresh credential material, provider payloads, audit metadata, storage paths, and unrelated records.
      required:
        - userProfileId
        - authAccountId
        - displayName
        - defaultCurrency
        - accountStatus
        - roles
        - createdAtUtc
        - updatedAtUtc
      properties:
        userProfileId:
          type: string
          format: uuid
        authAccountId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 160
        defaultCurrency:
          oneOf:
            - $ref: "#/components/schemas/CurrencyCode"
            - type: "null"
        accountStatus:
          type: string
          enum:
            - active
            - disabled
        roles:
          type: array
          items:
            type: string
            enum:
              - owner
              - admin
              - user
          uniqueItems: true
        createdAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
    CreateGroupRequest:
      type: object
      description: Group creation request. Creator and owner membership are derived from the authenticated actor.
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
          description: Group name after server-side trimming. Blank or whitespace-only values are rejected.
    UpdateGroupRequest:
      type: object
      description: Group settings update. Only the name can be updated in this foundation endpoint.
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
          description: Group name after server-side trimming. Blank or whitespace-only values are rejected.
    GroupListResponse:
      type: object
      description: Groups where the authenticated actor has active membership. This foundation response is intentionally unpaginated for now.
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/GroupResponse"
    GroupResponse:
      type: object
      description: Safe group summary for the authenticated actor. It excludes creator profile IDs, unrelated members, auth/session/credential data, provider payloads, audit metadata, storage paths, and group policy internals.
      required:
        - id
        - name
        - currentUserRole
        - currentUserStatus
        - createdAtUtc
        - updatedAtUtc
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 160
        currentUserRole:
          $ref: "#/components/schemas/GroupRole"
        currentUserStatus:
          $ref: "#/components/schemas/GroupMembershipStatus"
        createdAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
    AddGroupMemberRequest:
      type: object
      description: Adds an existing active registered user profile to a group. Role defaults to member when omitted; clients cannot submit actor IDs, auth account IDs, owner IDs, or authorization context.
      additionalProperties: false
      required:
        - userProfileId
      properties:
        userProfileId:
          type: string
          format: uuid
          description: Existing active user profile with an active auth account.
        role:
          $ref: "#/components/schemas/GroupRole"
    UpdateGroupMemberRequest:
      type: object
      description: Updates the group role for an existing active group membership. The route userProfileId identifies the member; body userProfileId fields are rejected.
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/GroupRole"
    GroupMemberListResponse:
      type: object
      description: Active registered group members visible to the authenticated actor.
      required:
        - members
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMemberResponse"
    GroupMemberResponse:
      type: object
      description: Safe group member summary. It excludes auth account IDs, identifiers, credentials, sessions, token material, provider payloads, audit metadata, storage paths, removed memberships, and unrelated users.
      required:
        - userProfileId
        - displayName
        - role
        - status
        - joinedAtUtc
        - updatedAtUtc
      properties:
        userProfileId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 160
        role:
          $ref: "#/components/schemas/GroupRole"
        status:
          $ref: "#/components/schemas/GroupMembershipStatus"
        joinedAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
    GroupRole:
      type: string
      description: Group-scoped role.
      enum:
        - owner
        - member
    GroupMembershipStatus:
      type: string
      description: Group membership status.
      enum:
        - active
        - removed
    SelfUserProfileResponse:
      type: object
      description: Safe self-profile response for the authenticated actor.
      required:
        - id
        - displayName
        - defaultCurrency
        - createdAtUtc
        - updatedAtUtc
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 160
        defaultCurrency:
          oneOf:
            - $ref: "#/components/schemas/CurrencyCode"
            - type: "null"
        createdAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
    UpdateSelfUserProfileRequest:
      type: object
      description: Safe self-profile update. Profile identity is derived from the authenticated actor, not from client input.
      additionalProperties: false
      minProperties: 1
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 160
          description: Display name after server-side trimming. Blank or whitespace-only values are rejected.
        defaultCurrency:
          oneOf:
            - $ref: "#/components/schemas/CurrencyCode"
            - type: "null"
          description: Optional default currency. Explicit null clears the value.
    SessionListResponse:
      type: object
      description: Safe active session metadata for the authenticated account. The list is capped by the API.
      required:
        - sessions
      properties:
        sessions:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/SessionSummary"
    SessionSummary:
      type: object
      description: Bounded session metadata that excludes token material, hashes, network data, user-agent data, and revocation details.
      required:
        - id
        - isCurrent
        - status
        - issuedAtUtc
        - expiresAtUtc
        - lastSeenAtUtc
        - deviceLabel
      properties:
        id:
          type: string
          format: uuid
        isCurrent:
          type: boolean
        status:
          type: string
          enum:
            - active
        issuedAtUtc:
          type: string
          format: date-time
        expiresAtUtc:
          type: string
          format: date-time
        lastSeenAtUtc:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        deviceLabel:
          oneOf:
            - type: string
              maxLength: 120
            - type: "null"
    CurrencyCode:
      type: string
      pattern: "^[A-Z]{3}$"
      description: ISO-4217 style currency code.
      examples:
        - USD
    Money:
      type: object
      description: Decimal-safe money value with an attached currency.
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          description: Decimal-safe amount represented as a string to avoid floating point loss.
          examples:
            - "12.34"
        currency:
          $ref: "#/components/schemas/CurrencyCode"
    RoundingMode:
      type: string
      description: Placeholder rounding modes for future policy-driven money handling.
      enum:
        - up
        - down
        - nearest
        - bankers
    SyncState:
      type: string
      description: Placeholder sync state values shared by local and server-mode clients.
      enum:
        - queued
        - synced
        - conflict
        - failed
    StorageObjectRef:
      type: object
      description: Stable storage object reference that does not expose physical filesystem paths.
      required:
        - id
      properties:
        id:
          type: string
          description: Opaque storage object identifier.
        contentType:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
    ProblemDetails:
      type: object
      description: RFC 7807 / RFC 9457 style problem response.
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
    OcrJobStatus:
      type: string
      description: Placeholder OCR job status values for future worker contract design.
      enum:
        - queued
        - processing
        - completed
        - failed
