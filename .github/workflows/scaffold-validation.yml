name: Scaffold Validation

on:
  pull_request:
    branches:
      - main
      - chore/monorepo-scaffold
      - feat/api-health-scaffold
      - feat/api-docker-health
      - feat/api-runtime-config
  push:
    branches:
      - main
      - chore/monorepo-scaffold
      - feat/api-health-scaffold
      - feat/api-docker-health
      - feat/api-runtime-config

jobs:
  validate:
    name: Validate scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install dependencies
        run: npm ci

      - name: Validate scaffold paths
        run: npm run validate:scaffold

      - name: Validate OpenAPI
        run: npm run validate:openapi

      - name: Validate API
        run: npm run validate:api

      - name: Validate Docker Compose
        run: npm run validate:compose

      - name: Validate API Docker image
        run: npm run validate:api-docker
